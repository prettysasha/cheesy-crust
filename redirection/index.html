<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Registration</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1>Register for a Course</h1>
    <form id="registration-form" name="regform" onsubmit="return validateform()" onreset="resetErrors()">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" required>
      <span id="name-error" class="error-message"></span>

      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>
      <span id="email-error" class="error-message"></span>

      <label for="password">Password</label>
      <input type="password" id="password" name="password" required>
      <span id="password-error" class="error-message"></span>

      <label for="course">Course</label>
      <select id="course" name="course" required>
        <option value="" disabled selected>Select a course</option>
        <option value="html-css">HTML & CSS</option>
        <option value="javascript">JavaScript</option>
        <option value="react">React</option>
        <option value="nodejs">Node.js</option>
      </select>
      <span id="course-error" class="error-message"></span>

      <p>
        <input type="checkbox" id="terms" name="terms" required>
        <label for="terms">I agree to the terms and conditions</label>
        <span id="terms-error" class="error-message"></span>
      </p>

      <div class="button-group">
        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
      </div>
    </form>
  </main>
  <script>
function resetErrors() {
  document.getElementById("name-error").textContent = "";
  document.getElementById("email-error").textContent = "";
  document.getElementById("password-error").textContent = "";
  document.getElementById("course-error").textContent = "";
  document.getElementById("terms-error").textContent = "";
}

function validateform() {
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const course = document.getElementById("course").value;
  const terms = document.getElementById("terms").checked;

  const nameError = document.getElementById("name-error");
  const emailError = document.getElementById("email-error");
  const passwordError = document.getElementById("password-error");
  const courseError = document.getElementById("course-error"); 
  const termsError = document.getElementById("terms-error");

  let isValid = true;

  if (name === "" || name.length < 3) {
    nameError.textContent = "Name must be at least 3 characters.";
    isValid = false;
  } else {
    nameError.textContent = "";
  }

  if (email === "" || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    emailError.textContent = "Please enter a valid email address.";
    isValid = false;
  } else {
    emailError.textContent = "";
  }

  if (password === "" || password.length < 6) {
    passwordError.textContent = "Password must be at least 6 characters.";
    isValid = false;
  } else {
    passwordError.textContent = "";
  }

  if (course === "" || course === "Select a course") {
    courseError.textContent = "Please select a course.";
    isValid = false;
  } else {
    courseError.textContent = "";
  }

  if (!terms) {
    termsError.textContent = "You must agree to the terms and conditions.";
    isValid = false;
  } else {
    termsError.textContent = "";
  }

  return isValid;
}
  </script>
</body>
</html>
